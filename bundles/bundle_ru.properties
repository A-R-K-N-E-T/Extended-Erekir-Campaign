##Mod info

mod.eec.name = Extended Erekir Campaign
mod.eec.author = [#019BF0]ARK[white][#2FDBFF]NET, [#2E8E05]iq[lime]tik[green]123[white]
mod.eec.description = Значительно расширяет кампанию Эрекира. Мод добавляет исключительно новые сектора в кампанию. \n\nДанный мод поддерживает данние языки: \n- Английский \n- Русский
mod.eec.subtitle = Значительно расширяет кампанию Эрекира.

## sectors

sector.eec-slag-coast.name = Шлаковый берег
sector.eec-slag-coast.description = Сектор, имеющий выход к Шлаковому морю, полному скал и островов. Местоположение сектора идеально для рейдов морских баз, однако, тут уже укрепился враг. Уничтожите врага. Увеличьте производство вольфрама.

sector.eec-Canyon.name = Каньйон
sector.eec-Canyon.description = Каньйон, что соединяет 2 вражеские базы через Троепутье. В нём находится ничем не примечательная вражеская база, которая, видимо, была построена совсем недавно и может быть усилена в ближайшем будующем. \nУничтожьте её пока враги не стали сильнее.

sector.eec-Threeways.name = Троепутье
sector.eec-Threeways.description = Данный сектор весьма богат на ресурсы, но противник не хочет допустить захвата этого сектора, поэтому он будет всеми силами пытаться уничтожить вас. \nТакже мы изучили технологию [accent]ускорения буров[]. Опробуйте её в действии.

sector.eec-Northern-Cave.name = Северная пещера
sector.eec-Northern-Cave.description = Очередной сектор с постройками Малиса. Имеет очень сильную защиту, но небольшое производство юнитов. В защите обнаружены новые технологии обороны, которые мы ещё не изучили. Как же прорвать оборону врага? Может, её стоит [accent]обойти[]?

sector.eec-Mountain-barrier.name = Горный барьер
sector.eec-Mountain-barrier.description = Горный сектор, который создаёт естественный барьер между [accent]Болотом[] и [accent]Цитаделью[]. В этой местности находиться вражеская база с большим количеством производства. \nУничтожьте этот барьер, чтобы открыть прямой путь от [accent]Болота[] до [accent]Цитадели[].

sector.eec-Grott.name = Гротт
sector.eec-Grott.description = Разведка показала, что враг имеет большое количество производства единиц 1-3 уровня, следовательно, он будет оказывать постоянное давление. \n\nТитан атакует слабо и не часто, Пламя имеет маленькую дальность... Однако, есть турель [accent]Злоба[]. Может, она поможет?...

sector.eec-export-station.name = Экспортная станция
sector.eec-export-station.description = Через данный сектор проходил главный торговый маршрут до обнаружения [accent]Ущелья[]. Враги тут построили небольшую станцию, где конвои могут отдохнуть и где подготавливаются ресурсы для экспорта в другие сектора. После обнаружения [accent]Ущелья[] этот сектор перестал пользоватся популярностью, однако, не смотря на это, всё производство и оборона работает на отлично. Захватите данный аванпост. \n\nПосле захвата основного торгового маршрута врагу нужно было срочно найти альтернативу, потому он вернулся к старым путям, что проходят через этот сектор. Это означает, что есть риск встретится с конвоями врага или другими подкреплениями отправленных в этот сектор.

sector.eec-Dangerous-Zone.name = Опасная зона: Источник
sector.eec-Dangerous-Zone.description = [#525150][Необязательный контент][][red][Сложный контент][] \nОдна из главных баз [purple]Малис[] в этом регионе. Враг будет пытаться выгнать вас из этого сектора. Уничтожьте эту Цитадель врага. \n\n[red]Если вы это читаете - ни за что, не пытайтесь это пройти!...[] - iqtik123

sector.eec-Beryllium-bastion.name = Бериллиевый бастион
sector.eec-Beryllium-bastion.description = [#525150][Необязательный контент][][red][Сложный контент][] \nВражеский бастион, который находится на южном полюсе. Главный сектор в этом регионе, с огромным вражеским присутствием. Большое количество бериллия и аркицита. \nЗахватите эту крепость.

sector.eec-Arcycite-Plains.name = Аркицитовые равнины
sector.eec-.description = Сектор с большим количеством аркицита. Также этот сектор известен своим большим количеством аванпостов и баз, некоторые из них контролируют высокоуровневые ресурсы. Уничтожьте все вражеские ядра.

sector.eec-Arcycite-Passage.name = Аркицитовый проход
sector.eec-Arcycite-Passage.description = Представляет из себя небольшой проход с относительно большим количеством аркицита и бериллия. Достаточно большое вражеское присутствие.

sector.eec-Arcycite-Fortress.name = Аркицитовая крепость
sector.eec-Arcycite-Fortress.description = Сердце базы находится в Аркицитовом биоме, из-за чего сектор так прозвали. \nМы обнаружили на нём новую турель, которая атакует на огромную дистанцию, с огромным уроном, но с маленькой скорострельностью. Мы пока что не знаем, как противостоять этой турели, но кто сказал, что она атакует по [accent]воздушным единицам[]?.
