##Mod info

mod.eec.name = Extended Erekir Campaign
mod.eec.author = [#019BF0]ARK[white][#2FDBFF]NET, [#2E8E05]iq[lime]tik[green]123[white]
mod.eec.description = Significantly expands the Erekir campaign. The mod adds exclusively new sectors to the campaign. \n\nThis mod supports the following languages: \n- English \n- Russian
mod.eec.subtitle = Significantly expands Erekir campaign.

## sectors
sector.eec-slag-coast.name = Slag coast
sector.eec-slag-coast.description = A sector with access to the Slag Sea, full of rocks and islands. The sector's location is ideal for raiding naval bases, but the enemy has already established a stronghold here. Destroy the enemy. Increase tungsten production.

sector.eec-Canyon.name = Canyon
sector.eec-Canyon.description = A canyon connecting two enemy bases via the Three Paths. It contains an unremarkable enemy base, apparently built quite recently and likely to be reinforced in the near future. Destroy it before the enemies become stronger.

sector.eec-Threeways.name = Threeways
sector.eec-Threeways.description = This sector is quite rich in resources, but the enemy doesn't want to allow it to be captured, so they will do everything they can to destroy you. \nWe've also researched the [accent]drill busted[] technology. Try it out.

sector.eec-Northern-Cave.name = Northern cave
sector.eec-Northern-Cave.description = Another sector with Malis structures. It has very strong defenses, but low unit production. New defensive technologies have been discovered in the defenses that we haven't yet researched. How can we break through the enemy's defenses? Maybe we should [accent]bypass them[]?

sector.eec-Mountain-barrier.name = Mountain barrier
sector.eec-Mountain-barrier.description = A mountainous sector that creates a natural barrier between the [accent]Marsh[] and the [accent]Stronghold[]. This area contains an enemy base with a large amount of production. \nDestroy this barrier to open a direct path from the [accent]Marsh[] to the [accent]Stronghold[].

sector.eec-Grott.name = Grott
sector.eec-Grott.description = Intelligence showed that the enemy has a large production capacity of Tier 1-3 units, so they will apply constant pressure. \n\nTitan attacks weakly and infrequently, and its Sublimates have a short range... However, there's a [accent]Malign[] turret. Maybe it will help?...

sector.eec-export-station.name = Export station
sector.eec-export-station.description = The main trade route passed through this sector before the discovery of the [accent]Ravine[]. The enemy built a small station here, where convoys could rest and where resources were prepared for export to other sectors. After the discovery of the [accent]Ravine[], this sector fell out of favor; however, despite this, all production and defenses are functioning perfectly. Capture this outpost. \n\nAfter capturing the main trade route, the enemy urgently needed an alternative, so they returned to the old routes that pass through this sector. This means there is a risk of encountering enemy convoys or other reinforcements sent to this sector.

sector.eec-Dangerous-Zone.name = Dangerous zone: Origin
sector.eec-Dangerous-Zone.description = [#525150][Optional Content][][red][Hard Content][] \nOne of the main [purple]Malis[] bases in this region. The enemy will try to drive you out of this sector. Destroy this enemy Citadel. \n\n[red]If you're reading this, don't attempt this!...[] - iqtik123

sector.eec-Beryllium-bastion.name = Beryllium bastion
sector.eec-Beryllium-bastion.description = [#525150][Optional Content][][red][Hard Content][] \nAn enemy stronghold located at the south pole. The main sector in this region, with a large enemy presence. Large amounts of beryllium and arcycite. \nCapture this stronghold.

sector.eec-Arcycite-Plains.name = Arcycite plains
sector.eec-Arcycite-Plains.description = A sector with a large amount of arkite. This sector is also known for its large number of outposts and bases, some of which control high-tier resources. Destroy all enemy cores.

sector.eec-Arcycite-Passage.name = Arcycite passage
sector.eec-Arcycite-Passage.description = It's a small passage with a relatively large amount of arcycite and beryllium. There's a fairly large enemy presence.

sector.eec-Arcycite-Fortress.name = Arcycite fortress
sector.eec-Arcycite-Fortress.description = The heart of the base is located in the arcycite biome, hence the sector's nickname. \nWe discovered a new turret there, which attacks at a huge range, deals massive damage, but has a slow rate of fire. We don't yet know how to counter this turret, but who said it attacks [accent]air units[]?
